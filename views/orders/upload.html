<section class="page-header">
  <h1>Файл удирдлага</h1>
  <p>Захиалга #<%= order.id %></p>
</section>

<section class="card">
  <% if (currentUser.role==='operator') { %>
    <form method="POST" action="/orders/<%= order.id %>/upload" enctype="multipart/form-data" class="form">
      <label>Зураг/видео файл</label>
      <input type="file" name="file" required />
      <button type="submit">Файл байршуулах</button>
    </form>
  <% } %>

  <h2>Байршуулсан файлууд</h2>
  <ul class="list">
    <% files.forEach(f=>{ %>
      <li><a href="<%= f.file_path %>" download><%= f.file_name %></a> (<%= f.file_type %>)</li>
    <% }) %>
  </ul>
</section>
