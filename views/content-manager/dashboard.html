<section class="page-header">
  <h1>Контент менежер самбар</h1>
  <p>Хүлээгдэж буй үйлчилгээний зарууд.</p>
</section>

<section class="card">
  <ul class="list">
    <% services.forEach(s=> { %>
      <li>
        <strong><%= s.title %></strong> — <%= s.operator_name %>
        <form class="inline-form" method="POST" action="/services/<%= s.id %>/approve">
          <button type="submit">Батлах</button>
        </form>
        <form class="inline-form" method="POST" action="/services/<%= s.id %>/reject">
          <button type="submit" class="btn-danger">Татгалзах</button>
        </form>
      </li>
    <% }) %>
  </ul>
</section>
